# =============================================================================
# Ansible Course Lab — Inventory
# =============================================================================
# All six Linux containers + the Day 3 Windows VM.
# Days 1–2 use only the [linux] group.
# Day 3 extends this to include [windows].
#
# Connection details:
#   Linux  — SSH on localhost, ports 2201–2206, key auth (lab_key)
#   Windows — WinRM on the IP provided by your instructor on Day 3
# =============================================================================

# ── LINUX HOSTS ───────────────────────────────────────────────────────────────

[webservers]
web01 ansible_host=127.0.0.1 ansible_port=2201
web02 ansible_host=127.0.0.1 ansible_port=2202

[databases]
db01  ansible_host=127.0.0.1 ansible_port=2203
db02  ansible_host=127.0.0.1 ansible_port=2204

[monitoring]
mon01 ansible_host=127.0.0.1 ansible_port=2205
mon02 ansible_host=127.0.0.1 ansible_port=2206

# Group of groups — all Linux hosts
[linux:children]
webservers
databases
monitoring

# ── WINDOWS HOSTS (Day 3 only) ────────────────────────────────────────────────
# Replace WIN_VM_IP with the address provided by your instructor on Day 3.

[windows]
winlab01 ansible_host=WIN_VM_IP

# ── ALL MANAGED HOSTS ─────────────────────────────────────────────────────────
[all_managed:children]
linux
windows

# ── LINUX CONNECTION VARIABLES ────────────────────────────────────────────────
[linux:vars]
ansible_python_interpreter=/usr/bin/python3

# ── WINDOWS CONNECTION VARIABLES (Module 12 — NTLM, for initial testing) ─────
# These are overridden in group_vars/windows/ when switching to Kerberos (Module 14)
[windows:vars]
ansible_connection=winrm
ansible_winrm_transport=ntlm
ansible_port=5985
ansible_winrm_server_cert_validation=ignore
ansible_user=labadmin
# ansible_password is stored in group_vars/windows/vault.yml (do not put it here)
